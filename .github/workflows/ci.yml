name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.3", "3.4"]
    steps:
      - uses: actions/checkout@v4
      - name: Clone abacatepay-ruby SDK (sibling path dep)
        run: git clone https://github.com/AbacatePay/abacatepay-ruby-sdk.git ../abacatepay-ruby-sdk
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rake test

  standard:
    name: standardrb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone abacatepay-ruby SDK (sibling path dep)
        run: git clone https://github.com/AbacatePay/abacatepay-ruby-sdk.git ../abacatepay-ruby-sdk
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - run: bundle exec standardrb
